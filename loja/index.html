<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> CAIXA LIVRE </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .topo{
            background-color: #ffc107;
            text-align: center;
            font-size: 52px;
            font-weight: bold;
            border: 4px solid #ffc107;
        }
        .painel{
            background-color: #c4c4cf;
            padding: 10;
            margin-bottom: 10px;
            border: 3px solid #1e1e1e;
        }
    </style>
</head>
<body class="bg-primary bg-gradient">
<div id="Alert"><br></div>

<div class="container mt-3">
    <div class="topo">
        CAIXA LIVRE
    </div>

<div class="row mt-3">
        <div class="col-md-7">
            <h3 class="text-white">
                <span class="badge text-bg-primary">
                    SUA COMPRA 🛒
                </span>
            </h3>
            <ul id="lista" class="list-group lista"></ul>
        </div>  

    <div class="col-md-5">
            <div class="painel"> TOTAL: R$ <span id="Total">0.00</span> </div>

        <div class="painel">
            <label> Código de Barras </label>
            <input type="text" id="cod" class="from-control">
        </div>

        <div class="painel">
            <label> Quantidade </label>
            <input type="text" id="qtd" class="from-control" value="1">
        </div>

        <div class="painel">
            <label> Quantidade x Valor </label>
            <div class="alert alert-light" role="alert">
                <span id="qtdXvl"> 0.00 </span\>
            </div>
        </div>

        <button class="btn btn-success w-100" onclick="addProduto()">
            Adicionar Produto
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
<script src="script.js" ></script>

</body>
</html>
